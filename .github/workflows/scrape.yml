name: Scrape PriceCharting

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours
  workflow_dispatch:

permissions:
  contents: write
  # Needed so we can trigger pages.yml via workflow_dispatch at the end.
  # GITHUB_TOKEN-pushed commits don't fire other workflows' `on: push`
  # triggers, so without this the Pages deploy never runs from a cron
  # scrape and the live site serves a stale data/snapshot.json.
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Hard ceiling so a hung patchright/Cloudflare interaction can't
    # leave the job running for hours. Normal scrape is ~2-3 min.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install patchright Chromium
        # patchright bundles its own browser-install command; the binary
        # is shared with vanilla playwright so installing once is enough.
        run: python -m patchright install --with-deps chromium

      - name: Run scraper
        run: python -m scraper.scrape

      - name: Commit snapshot
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Retry on push race: if someone else pushed between our scrape
          # and our push, rebase on top and retry. Up to 5 attempts.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejected (attempt $i), rebasing..."
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1

      - name: Trigger Pages deploy
        # GITHUB_TOKEN-pushed commits DON'T fire the `on: push` trigger in
        # pages.yml, so without an explicit workflow_dispatch the live
        # site never picks up the new snapshot. Dispatch only when we
        # actually committed something, to avoid no-op deploys.
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
