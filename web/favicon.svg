<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Mirrors the .brand-mark in the header: red/white pokeball with a
       horizontal band and a center "button". Rounded square so it sits
       cleanly as a tab favicon and an iOS/Android home-screen icon. -->
  <rect width="64" height="64" rx="14" fill="#0b0d12"/>
  <clipPath id="r">
    <rect x="6" y="6" width="52" height="52" rx="11"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect x="6" y="6" width="52" height="26" fill="#ef4444"/>
    <rect x="6" y="32" width="52" height="26" fill="#ffffff"/>
    <rect x="6" y="29" width="52" height="6" fill="#0b0d12"/>
    <circle cx="32" cy="32" r="8" fill="#0b0d12"/>
    <circle cx="32" cy="32" r="5" fill="#ffffff"/>
    <circle cx="32" cy="32" r="2.5" fill="#0b0d12"/>
  </g>
</svg>
