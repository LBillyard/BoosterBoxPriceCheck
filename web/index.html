<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Base Set Booster Box</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white">
  <main class="container py-4" style="max-width: 540px;">

    <header class="d-flex align-items-center justify-content-between mb-3">
      <div>
        <h1 class="h5 mb-0 fw-semibold">Base Set Booster Box</h1>
        <small id="updated" class="text-muted">Loading…</small>
      </div>
      <button id="refresh" class="btn btn-sm btn-outline-secondary rounded-circle" title="Refresh" aria-label="Refresh">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </header>

    <div class="card border-0 shadow-sm mb-3 hero-card">
      <div class="card-body text-center py-4">
        <div class="text-uppercase small text-muted fw-semibold mb-1 letter-wide">Current Value</div>
        <div id="hero-gbp" class="display-4 fw-bold text-success mb-1 lh-1">—</div>
        <div id="hero-usd" class="text-muted">—</div>
        <div id="pl-row" class="mt-3 d-none">
          <span class="badge rounded-pill" id="pl-badge">—</span>
          <small class="text-muted ms-1">vs purchase</small>
        </div>
      </div>
    </div>

    <div id="conditions" class="row g-2 mb-3"></div>

    <div class="row g-2 mb-3">
      <div class="col-12 col-sm-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <div class="text-uppercase small text-muted fw-semibold mb-1 letter-wide">Last Sold</div>
            <div id="last-sold" class="fw-semibold fs-5">—</div>
            <div id="last-sold-sub" class="text-muted small">—</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-sm-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body">
            <div class="text-uppercase small text-muted fw-semibold mb-1 letter-wide">Listings</div>
            <div id="listings-summary" class="fw-semibold fs-5">—</div>
            <div id="listings-sub" class="text-muted small">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm mb-3" id="listings-card" hidden>
      <ul id="listings-list" class="list-group list-group-flush"></ul>
    </div>

    <div class="card border-0 shadow-sm mb-3" id="recent-sales-card" hidden>
      <div class="card-body pb-1">
        <div class="text-uppercase small text-muted fw-semibold letter-wide">Recent Sales</div>
      </div>
      <ul id="recent-sales-list" class="list-group list-group-flush"></ul>
    </div>

    <div id="error" class="alert alert-warning small" role="alert" hidden></div>

    <footer class="text-center text-muted small mt-4">
      <a href="https://www.pricecharting.com/game/pokemon-base-set/booster-box" target="_blank" rel="noopener" class="text-muted text-decoration-none">
        Source: PriceCharting <i class="bi bi-box-arrow-up-right"></i>
      </a>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
