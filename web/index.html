<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12">
  <title>Base Set Booster Box · Portfolio</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">

    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <img class="brand-sprite"
             src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png"
             alt=""
             aria-hidden="true"
             loading="lazy">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="eyebrow">Pokémon TCG · WOTC</div>
          <h1 class="brand-title">Base Set Booster Box</h1>
          <div class="brand-meta">
            <span class="dot dot-live" id="status-dot" aria-hidden="true"></span>
            <span id="updated">Loading…</span>
          </div>
        </div>
      </div>
      <button id="refresh" class="icon-btn" title="Refresh now" aria-label="Refresh now">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </header>

    <!-- Hero / current value -->
    <section class="hero">
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="hero-inner">
        <div class="eyebrow">Estimated value</div>
        <div class="hero-row">
          <div class="hero-gbp" id="hero-gbp">—</div>
        </div>
        <div class="hero-sub" id="hero-usd">—</div>
        <div class="pl-row" id="pl-row" hidden>
          <span class="pl-pill" id="pl-badge">—</span>
          <span class="pl-vs">vs purchase £29,253</span>
        </div>
        <svg id="hero-spark" class="hero-spark" viewBox="0 0 200 28"
             preserveAspectRatio="none" aria-hidden="true" hidden></svg>
        <ul class="chase-row" aria-label="Iconic Base Set holos">
          <li>
            <a href="https://www.pricecharting.com/game/pokemon-base-set/charizard-4"
               target="_blank" rel="noopener" title="Charizard">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png"
                   alt="Charizard" loading="lazy">
            </a>
          </li>
          <li>
            <a href="https://www.pricecharting.com/game/pokemon-base-set/blastoise-2"
               target="_blank" rel="noopener" title="Blastoise">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/9.png"
                   alt="Blastoise" loading="lazy">
            </a>
          </li>
          <li>
            <a href="https://www.pricecharting.com/game/pokemon-base-set/venusaur-15"
               target="_blank" rel="noopener" title="Venusaur">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/3.png"
                   alt="Venusaur" loading="lazy">
            </a>
          </li>
          <li>
            <a href="https://www.pricecharting.com/game/pokemon-base-set/mewtwo-10"
               target="_blank" rel="noopener" title="Mewtwo">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/150.png"
                   alt="Mewtwo" loading="lazy">
            </a>
          </li>
          <li>
            <a href="https://www.pricecharting.com/game/pokemon-base-set/pikachu-58"
               target="_blank" rel="noopener" title="Pikachu">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"
                   alt="Pikachu" loading="lazy">
            </a>
          </li>
          <li>
            <a href="https://www.pricecharting.com/game/pokemon-base-set/alakazam-1"
               target="_blank" rel="noopener" title="Alakazam">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/65.png"
                   alt="Alakazam" loading="lazy">
            </a>
          </li>
        </ul>
      </div>
    </section>

    <!-- Quick stats grid -->
    <section class="stats">
      <div class="stat" id="stat-loose">
        <div class="stat-label">Loose</div>
        <div class="stat-value" id="stat-loose-value">—</div>
        <div class="stat-sub" id="stat-loose-sub">PriceCharting</div>
      </div>
      <div class="stat" id="stat-last-sold">
        <div class="stat-label">Last sold</div>
        <div class="stat-value" id="stat-last-sold-value">—</div>
        <div class="stat-sub" id="stat-last-sold-sub">—</div>
      </div>
      <div class="stat" id="stat-listings">
        <div class="stat-label">Active listings</div>
        <div class="stat-value" id="stat-listings-value">—</div>
        <div class="stat-sub" id="stat-listings-sub">—</div>
      </div>
    </section>

    <!-- Active eBay listings (currently for sale) -->
    <section class="feed" id="active-card" hidden>
      <div class="feed-head">
        <div class="eyebrow">For sale right now</div>
        <span class="feed-count" id="active-count"></span>
      </div>
      <ul class="feed-list" id="active-list"></ul>
    </section>

    <!-- Recent sales feed (cumulative history) -->
    <section class="feed" id="recent-sales-card" hidden>
      <div class="feed-head">
        <div class="eyebrow">Recent sales</div>
        <span class="feed-count" id="feed-count"></span>
      </div>
      <ul class="feed-list" id="recent-sales-list"></ul>
    </section>

    <!-- PriceCharting marketplace listings (legacy) -->
    <section class="feed" id="listings-card" hidden>
      <div class="feed-head">
        <div class="eyebrow">PriceCharting marketplace</div>
      </div>
      <ul class="feed-list" id="listings-list"></ul>
    </section>

    <!-- Error / status -->
    <div class="alert" id="error" role="alert" hidden></div>

    <footer class="foot">
      <a href="https://www.pricecharting.com/game/pokemon-base-set/booster-box" target="_blank" rel="noopener" class="foot-link">
        PriceCharting <i class="bi bi-box-arrow-up-right"></i>
      </a>
      <span class="foot-sep">·</span>
      <span class="foot-meta">Refreshes every 12h</span>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
